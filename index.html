<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>برامج بلس</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
display:flex;
flex-direction:column;
align-items:center;
overflow-x:hidden;
}

/* النجوم */

.stars{
position:fixed;
width:100%;
height:100%;
z-index:-1;
}

.star{
position:absolute;
background:white;
border-radius:50%;
animation:move 8s linear infinite,twinkle 2s alternate infinite;
}

@keyframes move{
0%{transform:translateY(-10px)}
100%{transform:translateY(100vh)}
}

@keyframes twinkle{
0%{opacity:0.2}
100%{opacity:1}
}

/* المستطيل */

.header-box{
margin-top:30px;
padding:15px 30px;
border-radius:20px;
font-weight:bold;
background:linear-gradient(45deg,#38bdf8,#a855f7);
box-shadow:0 0 25px #38bdf8,0 0 25px #a855f7;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{box-shadow:0 0 10px #38bdf8}
to{box-shadow:0 0 40px #a855f7}
}

.container{
width:90%;
max-width:500px;
margin-top:20px;
}

/* التطبيق */

.app-card{
display:flex;
align-items:center;
justify-content:space-between;
background:#111827;
padding:15px;
margin:15px 0;
border-radius:20px;
position:relative;
overflow:hidden;
}

/* ضوء أخضر خلف التطبيق */

.app-card::before{
content:'';
position:absolute;
width:200%;
height:200%;
background:radial-gradient(circle,#22c55e55,transparent 60%);
animation:greenGlow 3s infinite;
}

@keyframes greenGlow{
0%{opacity:0.2}
50%{opacity:0.7}
100%{opacity:0.2}
}

.app-card img{
width:70px;
height:70px;
border-radius:15px;
position:relative;
z-index:1;
}

.app-info{
flex:1;
margin:0 10px;
text-align:right;
z-index:1;
}

.app-name{
font-size:18px;
font-weight:bold;
}

.app-desc{
font-size:12px;
color:#94a3b8;
margin-top:4px;
}

.app-desc a{
color:#38bdf8;
text-decoration:none;
font-weight:bold;
}

/* زر التثبيت */

.install-btn{
background:#38bdf8;
border:none;
padding:10px 18px;
border-radius:12px;
font-weight:bold;
color:white;
cursor:pointer;
transition:0.3s;
z-index:1;
}

.install-btn.active{
background:#22c55e;
box-shadow:0 0 20px #22c55e;
}

/* صورة التلقرام */

.telegram-img{
margin:30px 0;
}

.telegram-img img{
width:60px;
height:60px;
border-radius:50%;
box-shadow:0 0 20px #229ED9;
}

</style>
</head>

<body>

<div class="stars" id="stars"></div>

<div class="header-box">
برامج بلس موقعة على شهادة مجانية
</div>

<div class="container">

<!-- إنستا ريكرام -->

<div class="app-card">
<button class="install-btn" onclick="installApp(this,'regram')">تثبيت</button>

<div class="app-info">
<div class="app-name">إنستا ريكرام</div>
<div class="app-desc">
لتفعيل المميزات 
<a href="https://t.me/atraheeb7/104" target="_blank">
اضغط هنا شاهد الشرح
</a>
</div>
</div>

<img src="https://i.ibb.co/b5zS2s7q/IMG-2965.png">
</div>


<!-- إنستا بيگرام -->

<div class="app-card">
<button class="install-btn" onclick="installApp(this,'begram')">تثبيت</button>

<div class="app-info">
<div class="app-name">إنستا بيگرام</div>
</div>

<img src="https://i.ibb.co/VWK8g2BZ/IMG-2964.png">
</div>


<!-- يوتيوب بلس -->

<div class="app-card">
<button class="install-btn" onclick="installApp(this,'youtube')">تثبيت</button>

<div class="app-info">
<div class="app-name">يوتيوب بلس</div>
</div>

<img src="https://i.ibb.co/35MhcCJ3/IMG-2962.png">
</div>


<!-- سينمانا -->

<div class="app-card">
<button class="install-btn" onclick="installApp(this,'cinemana')">تثبيت</button>

<div class="app-info">
<div class="app-name">سينمانا</div>
</div>

<img src="https://i.ibb.co/r2QNL8cY/IMG-2943.png">
</div>


<!-- واتساب الذهبي -->

<div class="app-card">
<button class="install-btn" onclick="installApp(this,'whatsapp')">تثبيت</button>

<div class="app-info">
<div class="app-name">واتساب الذهبي</div>
</div>

<img src="https://i.ibb.co/tMXC8xfd/IMG-2963.png">
</div>

</div>


<!-- صورة التلقرام -->

<div class="telegram-img">
<a href="https://t.me/atraheebb" target="_blank">
<img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg">
</a>
</div>


<script>

/* النجوم */

let stars=document.getElementById("stars")

for(let i=0;i<120;i++){
let s=document.createElement("div")
s.className="star"
s.style.width=Math.random()*3+"px"
s.style.height=s.style.width
s.style.left=Math.random()*100+"vw"
s.style.top=Math.random()*100+"vh"
stars.appendChild(s)
}


/* زر التثبيت */

function installApp(btn,app){

btn.classList.add("active")

setTimeout(()=>{
btn.classList.remove("active")
},3000)


if(app=="regram"){
window.location="itms-services://?action=download-manifest&url=https://github.com/atraheeb/REGRAM/releases/download/Y/manifest.plist"
}

if(app=="begram"){
window.location="itms-services://?action=download-manifest&url=https://github.com/atraheeb/Beegram/releases/download/M/manifest.plist"
}

if(app=="youtube"){
window.location="itms-services://?action=download-manifest&url=https://github.com/atraheeb/YouTube-/releases/download/R/manifest.plist"
}

if(app=="cinemana"){
window.location="itms-services://?action=download-manifest&url=https://github.com/atraheeb/Cinemanahhh/releases/download/3/manifest.plist"
}

if(app=="whatsapp"){
window.location="itms-services://?action=download-manifest&url=https://github.com/atraheeb/Whatsapp-/releases/download/E/manifest.plist"
}

}

</script>

</body>
</html>
